<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/dashboard/payTracker-1.css">


    <title>Pay Tracker</title>
</head>

<body>
    <main>

        <!--mt   -- Header --     -->
        <header>
            <h1>Pay Tracker</h1>

            <div class="statusBar_Cont">
                <p id="payTrackerStatus">Checking admin access...</p>
            </div>

        </header>

        <!--mt   -- PayTracker Toolbar --     -->
        <section class="payTrackerToolbar_Cont">
            <div class="backBtn_Cont">
                <button id="backToAdminBtn">Admin Dashboard</button>

            </div>

            <div class="toolBarBtn_Cont">
                <button type="button" id="toggleStatsBtn">Show Stats</button>
                <button type="button" id="toggleTablesBtn">Show Tables</button>
            </div>

        </section>

        <!--!           ----    Main Content    ----             -->

        <!--mt  -- Pay Tracker Content --   -->
        <!--st  -- Jobs Stats --   -->
        <section id="payTrackerContent" style="display: none;">

            <div class="payTrackerStatsSection" style="display: none;">
                <h2>Pay Tracker Stats</h2>

                <!--/ Stats will be displayed here (styles in JS/payTracker.js) -->
                <div id="payTrackerStatsBar"></div>
            </div>

        </section>

        <!--st  -- Jobs Pay Tables --   -->
        <section>
            <div class="createTableSection" style="display: none;">
                <h2>Create Pay Table</h2>

                <form id="createTableForm">
                    <label for="tableName">Table Name</label>
                    <input type="text" id="tableName" name="tableName" placeholder="Enter table name" required />

                    <button type="submit">Create Table</button>
                </form>
            </div>

            <div class="tablesSection" style="display: none;">
                <h2>Pay Tables</h2>
                <div id="tablesContainer"></div>

            </div>

        </section>


    </main>

    <script src="/JS/payTracker.js"></script>

</body>

</html>
