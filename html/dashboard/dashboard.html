<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/dashboard/dashboard.css">


    <title>Admin Dashboard</title>
</head>

<body>
    <!--mt     --  Header  --    -->
    <header class="dashboardHeader_Cont">
        <div class="logoutBtn_Cont">
            <button id="logoutBtn">Logout</button>
        </div>

        <div class="welcomeBanner_Cont">
            <h3>Admin Dashboard</h3>
            <p id="adminStatus">You are NOT logged in!</p>
        </div>

    </header>

    <!--mt     --  Admin Features Navigation  --    -->
    <section id="adminContent" style="display: none;">
        <div class="adminToolbar">
            <button id="loadStatsBtn">Show Stats</button>
            <button id="loadCommentsBtn">Show Comments</button>
            <button id="payTrackerBtn">Pay Tracker</button>

        </div>

    </section>

    <!--mt     --  Stats and Comments  --    -->
    <section>
        <div id="statsContainer" class="statsBanner"></div>

        <div id="commentsContainer" class="commentsSection"></div>
    </section>

    <script src="/JS/admin.js"></script>

</body>

</html>
